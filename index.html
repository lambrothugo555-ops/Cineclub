<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="CinéClub"/>
  <link id="apple-icon" rel="apple-touch-icon" href="#"/>
  <link id="fav-icon" rel="icon" type="image/png" href="#"/>
  <title>🎬 CinéClub</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1f1f1f;--surface3:#2a2a2a;--red:#e50914;--gold:#f5c518;--green:#28a745;--text:#fff;--muted:#808080;--radius:10px;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:430px;margin:0 auto;overflow-x:hidden;}
    input,select,button,textarea{font-family:'DM Sans',sans-serif;}
    input:focus,select:focus,textarea:focus{outline:none;}
    button{transition:opacity .15s,transform .15s;cursor:pointer;}
    button:active{opacity:.75;transform:scale(.97);}
    .screen{display:none;flex-direction:column;min-height:100dvh;}
    .screen.active{display:flex;}

    /* HOME */
    #screen-home{background:var(--bg);align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden;}
    #screen-home::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(229,9,20,.22) 0%,transparent 65%);pointer-events:none;}
    .home-logo{text-align:center;margin-bottom:40px;animation:fadeUp .5s ease;position:relative;}
    .logo-icon{font-size:64px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(229,9,20,.6));}
    .logo-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;background:linear-gradient(135deg,#fff 30%,#e50914);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
    .logo-sub{color:var(--muted);font-size:14px;font-weight:500;margin-top:6px;letter-spacing:1px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .home-card{width:100%;max-width:360px;background:var(--surface);border-radius:16px;padding:28px 24px;border:1px solid rgba(255,255,255,.06);animation:fadeUp .6s ease .1s both;}
    .field-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:8px;}
    .text-input{width:100%;padding:14px 16px;border-radius:var(--radius);border:1.5px solid rgba(255,255,255,.08);background:var(--surface2);color:var(--text);font-size:15px;font-weight:500;transition:border-color .2s;}
    .text-input:focus{border-color:var(--red);}
    .text-input::placeholder{color:var(--muted);}
    .btn-red{width:100%;padding:15px;border-radius:var(--radius);border:none;background:var(--red);color:white;font-size:15px;font-weight:600;box-shadow:0 4px 20px rgba(229,9,20,.4);}
    .btn-outline{width:100%;padding:15px;border-radius:var(--radius);border:1.5px solid rgba(255,255,255,.15);background:transparent;color:var(--text);font-size:15px;font-weight:600;}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:12px;font-weight:600;letter-spacing:1px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
    .code-input{text-align:center;letter-spacing:6px;font-size:22px;font-weight:700;text-transform:uppercase;}
    .error-box{background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.3);color:#ff6b6b;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
    .error-box.show{display:block;}
    .mb16{margin-bottom:16px;}

    /* LOADING */
    #screen-loading{align-items:center;justify-content:center;background:var(--bg);}
    .spinner{width:40px;height:40px;border:3px solid rgba(229,9,20,.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:var(--muted);font-size:14px;margin-top:14px;}

    /* MAIN */
    #screen-main{background:var(--bg);}
    .main-header{background:linear-gradient(to bottom,#0a0a0a 60%,transparent);padding:44px 16px 0;position:sticky;top:0;z-index:50;}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .header-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--red);}
    .header-right{display:flex;align-items:center;gap:8px;}
    .code-pill{background:var(--surface2);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--muted);}
    .exit-btn{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--muted);font-size:12px;font-weight:600;padding:6px 10px;}
    .stats-row{display:flex;gap:8px;margin-bottom:14px;}
    .stat{flex:1;background:var(--surface);border-radius:var(--radius);padding:10px;text-align:center;border:1px solid rgba(255,255,255,.05);}
    .stat-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:var(--red);}
    .stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
    .tabs{display:flex;gap:4px;padding:0 0 10px;}
    .tab{flex:1;padding:9px;border-radius:8px;border:none;background:var(--surface2);color:var(--muted);font-size:13px;font-weight:600;}
    .tab.active{background:var(--red);color:white;}
    .chips{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
    .chips::-webkit-scrollbar{display:none;}
    .chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;}
    .chip.active{border-color:var(--red);color:var(--red);background:rgba(229,9,20,.1);}

    /* GRID */
    .grid-body{flex:1;padding:0 16px 100px;overflow-y:auto;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .poster-card{position:relative;border-radius:var(--radius);overflow:hidden;background:var(--surface2);aspect-ratio:2/3;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .poster-card:active{transform:scale(.96);}
    .poster-img{width:100%;height:100%;object-fit:cover;display:block;}
    .poster-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--surface2);}
    .poster-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.95));padding:22px 7px 7px;}
    .poster-title{font-size:10px;font-weight:600;line-height:1.3;color:white;}
    .poster-status{position:absolute;top:5px;right:5px;border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;text-transform:uppercase;}
    .s-voir{background:rgba(229,9,20,.9);color:white;}
    .s-cours{background:rgba(245,197,24,.9);color:#000;}
    .s-vu{background:rgba(40,167,69,.9);color:white;}
    .poster-stars{position:absolute;top:5px;left:5px;font-size:9px;background:rgba(0,0,0,.75);border-radius:5px;padding:2px 5px;color:var(--gold);font-weight:700;}

    /* STATUS QUICK BUTTONS on card */
    .card-status-bar{position:absolute;bottom:0;left:0;right:0;display:flex;opacity:0;transition:opacity .2s;pointer-events:none;}
    .poster-card.show-bar .card-status-bar{opacity:1;pointer-events:all;}
    .csb-btn{flex:1;padding:8px 2px;border:none;font-size:10px;font-weight:700;cursor:pointer;text-align:center;}
    .csb-voir{background:rgba(229,9,20,.92);color:white;}
    .csb-cours{background:rgba(245,197,24,.92);color:#000;}
    .csb-vu{background:rgba(40,167,69,.92);color:white;}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
    .empty-icon{font-size:52px;margin-bottom:12px;display:block;}
    .empty-text{font-size:16px;font-weight:600;color:#555;}

    /* FAB */
    .fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;border:none;background:var(--red);color:white;font-size:28px;box-shadow:0 6px 24px rgba(229,9,20,.5);display:flex;align-items:center;justify-content:center;z-index:100;}

    /* MODALS */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{width:100%;max-width:430px;background:var(--surface);border-radius:20px 20px 0 0;padding:12px 20px calc(32px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-height:90dvh;overflow-y:auto;border:1px solid rgba(255,255,255,.07);border-bottom:none;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:36px;height:4px;background:var(--surface3);border-radius:2px;margin:0 auto 18px;}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:16px;}

    /* SEARCH */
    .search-results-wrap{margin-top:10px;border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,.06);max-height:260px;overflow-y:auto;}
    .search-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface2);border-bottom:1px solid rgba(255,255,255,.04);}
    .search-item:last-child{border-bottom:none;}
    .search-item:active{background:var(--surface3);}
    .search-thumb{width:36px;height:54px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--surface3);}
    .search-info{flex:1;min-width:0;}
    .search-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .search-meta{font-size:12px;color:var(--muted);margin-top:2px;}
    .search-type{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;margin-left:4px;}
    .type-film{background:rgba(229,9,20,.2);color:var(--red);}
    .type-serie{background:rgba(245,197,24,.15);color:var(--gold);}
    .searching{padding:14px;text-align:center;color:var(--muted);font-size:13px;background:var(--surface2);}

    /* DETAIL MODAL */
    .detail-modal{width:100%;max-width:430px;background:var(--surface);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-height:92dvh;overflow-y:auto;border:1px solid rgba(255,255,255,.07);border-bottom:none;}
    .modal-overlay.open .detail-modal{transform:translateY(0);}
    .detail-backdrop{width:100%;height:180px;object-fit:cover;object-position:center top;display:block;}
    .detail-backdrop-ph{width:100%;height:180px;background:linear-gradient(135deg,var(--surface2),var(--surface3));display:flex;align-items:center;justify-content:center;font-size:56px;}
    .detail-body{padding:14px 18px;}
    .detail-header{display:flex;gap:14px;margin-top:-46px;margin-bottom:14px;}
    .detail-poster{width:74px;height:110px;border-radius:var(--radius);object-fit:cover;border:2px solid var(--surface);flex-shrink:0;}
    .detail-poster-ph{width:74px;height:110px;border-radius:var(--radius);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid var(--surface);flex-shrink:0;}
    .detail-info{flex:1;padding-top:50px;}
    .detail-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.1;}
    .detail-year{font-size:12px;color:var(--muted);margin-top:2px;}
    .detail-genres{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
    .genre-tag{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--surface3);color:var(--muted);font-weight:600;}
    .detail-overview{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:16px;}
    .detail-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
    .detail-by{font-size:13px;color:var(--muted);margin-bottom:14px;}
    .detail-by span{color:var(--text);font-weight:600;}

    /* STATUS SELECTOR */
    .status-selector{display:flex;gap:8px;margin-bottom:16px;}
    .status-opt{flex:1;padding:10px 4px;border-radius:8px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:var(--muted);font-size:11px;font-weight:700;text-align:center;}
    .sel-voir{border-color:var(--red)!important;color:var(--red)!important;background:rgba(229,9,20,.1)!important;}
    .sel-cours{border-color:var(--gold)!important;color:var(--gold)!important;background:rgba(245,197,24,.1)!important;}
    .sel-vu{border-color:var(--green)!important;color:var(--green)!important;background:rgba(40,167,69,.1)!important;}

    /* STARS */
    .stars-selector{display:flex;gap:6px;margin-bottom:16px;}
    .star-btn{font-size:26px;background:none;border:none;opacity:.25;padding:0;}
    .star-btn.active{opacity:1;}

    .trailer-btn{width:100%;padding:13px;border-radius:var(--radius);border:1.5px solid rgba(255,255,255,.15);background:transparent;color:var(--text);font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px;}

    /* COMMENT */
    .comment-area{width:100%;padding:12px 14px;border-radius:var(--radius);border:1.5px solid rgba(255,255,255,.08);background:var(--surface2);color:var(--text);font-size:14px;resize:none;height:80px;margin-bottom:16px;}
    .comment-area:focus{border-color:var(--red);}
    .save-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--red);color:white;font-size:14px;font-weight:600;margin-bottom:8px;box-shadow:0 4px 16px rgba(229,9,20,.35);}
    .del-btn{width:100%;padding:12px;border-radius:var(--radius);border:1px solid rgba(229,9,20,.3);background:transparent;color:var(--red);font-size:14px;font-weight:600;}

    /* TOAST */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-16px);background:var(--surface2);color:var(--text);padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 24px rgba(0,0,0,.5);}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-logo">
    <span class="logo-icon">🎬</span>
    <div class="logo-title">CinéClub</div>
    <div class="logo-sub">Votre liste de films &amp; séries</div>
  </div>
  <div class="home-card">
    <div class="mb16">
      <label class="field-label">Ton prénom</label>
      <input id="name-input" class="text-input" type="text" placeholder="Ex: Marie" maxlength="20" autocomplete="off"/>
    </div>
    <div id="home-error" class="error-box"></div>
    <button class="btn-red mb16" onclick="createList()">🎬 Créer une nouvelle liste</button>
    <div class="divider">ou rejoindre</div>
    <div class="mb16">
      <label class="field-label">Code de la liste</label>
      <input id="code-input" class="text-input code-input" type="text" placeholder="AB12CD" maxlength="6" autocomplete="off"/>
    </div>
    <button class="btn-outline" onclick="joinList()">🔗 Rejoindre la liste</button>
  </div>
  <div style="margin-top:20px;color:#444;font-size:12px;text-align:center;">Synchronisation en temps réel · Powered by TMDB</div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="screen">
  <div class="spinner"></div>
  <div class="loading-text">Connexion...</div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="main-header">
    <div class="header-top">
      <div class="header-logo">CinéClub</div>
      <div class="header-right">
        <div class="code-pill" id="header-code" onclick="copyCode()">------</div>
        <button class="exit-btn" onclick="disconnect()">🚪</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-num" id="stat-voir">0</div><div class="stat-lbl">À voir</div></div>
      <div class="stat"><div class="stat-num" id="stat-cours">0</div><div class="stat-lbl">En cours</div></div>
      <div class="stat"><div class="stat-num" id="stat-vu">0</div><div class="stat-lbl">Vus</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTypeFilter('all',this)">Tout</button>
      <button class="tab" onclick="setTypeFilter('film',this)">🎬 Films</button>
      <button class="tab" onclick="setTypeFilter('serie',this)">📺 Séries</button>
    </div>
  </div>
  <div class="chips" id="chips-row">
    <button class="chip active" onclick="setGenreFilter('all',this)">Tous genres</button>
  </div>
  <div class="grid-body">
    <div class="grid" id="main-grid"></div>
  </div>
  <button class="fab" onclick="openAdd()">+</button>
</div>

<!-- MODAL ADD -->
<div class="modal-overlay" id="modal-add" onclick="handleOverlay(event,'modal-add')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Ajouter un titre</div>
    <div class="mb16">
      <label class="field-label">Rechercher</label>
      <input id="search-input" class="text-input" type="text" placeholder="Nom du film ou série…" autocomplete="off"/>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal-detail" onclick="handleOverlay(event,'modal-detail')">
  <div class="detail-modal" id="detail-content"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAjbpUDc-xMs136zESzF4sFO1SDwBH6g_A",
    authDomain: "liste-de-courses-cfa36.firebaseapp.com",
    databaseURL: "https://liste-de-courses-cfa36-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liste-de-courses-cfa36",
    storageBucket: "liste-de-courses-cfa36.firebasestorage.app",
    messagingSenderId: "167756688973",
    appId: "1:167756688973:web:73e686f8f66a00aaddb604"
  };
  const TMDB_KEY = "2b7e1cf9e5f6a058b2ea928e8b543af7";
  const TMDB_IMG = "https://image.tmdb.org/t/p/w342";
  const TMDB_BACK = "https://image.tmdb.org/t/p/w780";

  const GENRE_MAP = {28:"Action",12:"Aventure",16:"Animation",35:"Comédie",80:"Crime",99:"Documentaire",18:"Drame",10751:"Famille",14:"Fantastique",36:"Histoire",27:"Horreur",10402:"Musique",9648:"Mystère",10749:"Romance",878:"Sci-Fi",53:"Thriller",10752:"Guerre",37:"Western",10759:"Action & Aventure",10762:"Enfants",10765:"Sci-Fi & Fantastique",10768:"Guerre & Politique"};

  let db, listCode, userName, unsubscribe = null;
  let typeFilter = 'all', genreFilter = 'all';
  let searchTimer = null, allItems = {};
  let currentDetailId = null;

  // Icon
  window.addEventListener('DOMContentLoaded', () => {
    const c = document.createElement('canvas'); c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0,0,512,512);
    g.addColorStop(0,'#0a0a0a'); g.addColorStop(1,'#e50914');
    ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(0,0,512,512,100); ctx.fill();
    ctx.font = '290px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\uD83C\uDFAC',256,270);
    const url = c.toDataURL('image/png');
    document.getElementById('apple-icon').href = url;
    document.getElementById('fav-icon').href = url;

    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      const q = e.target.value.trim();
      if (q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
      document.getElementById('search-results').innerHTML = '<div class="searching">🔍 Recherche...</div>';
      searchTimer = setTimeout(() => searchTMDB(q), 500);
    });
  });

  // Firebase
  async function initFirebase() {
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getDatabase, ref, set, onValue, update, remove, push, get } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    db = { database: getDatabase(app), ref, set, onValue, update, remove, push, get };
  }

  function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }
  function saveSession() { localStorage.setItem('cc_name', userName); localStorage.setItem('cc_code', listCode); }
  function clearSession() { localStorage.removeItem('cc_name'); localStorage.removeItem('cc_code'); }

  async function restoreSession() {
    const n = localStorage.getItem('cc_name'), c = localStorage.getItem('cc_code');
    if (n && c) {
      show('loading');
      try {
        await initFirebase();
        const snap = await db.get(db.ref(db.database, `cineclub/${c}`));
        if (snap.exists()) { listCode = c; userName = n; enterMain(); return; }
      } catch(e) {}
      clearSession(); show('home');
    }
  }
  restoreSession();

  async function createList() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { showError("Entre ton prénom !"); return; }
    show('loading');
    try {
      await initFirebase();
      listCode = Math.random().toString(36).substring(2,8).toUpperCase();
      userName = name;
      await db.set(db.ref(db.database, `cineclub/${listCode}`), { createdAt: Date.now(), createdBy: name, titles: {} });
      enterMain();
    } catch(e) { showError("Erreur : " + e.message); show('home'); }
  }

  async function joinList() {
    const name = document.getElementById('name-input').value.trim();
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (!name) { showError("Entre ton prénom !"); return; }
    if (code.length !== 6) { showError("Code à 6 caractères !"); return; }
    show('loading');
    try {
      await initFirebase();
      const snap = await db.get(db.ref(db.database, `cineclub/${code}`));
      if (!snap.exists()) { showError("Code introuvable !"); show('home'); return; }
      listCode = code; userName = name; enterMain();
    } catch(e) { showError("Erreur de connexion"); show('home'); }
  }

  function enterMain() {
    saveSession();
    document.getElementById('header-code').textContent = listCode;
    show('main');
    if (unsubscribe) unsubscribe();
    unsubscribe = db.onValue(db.ref(db.database, `cineclub/${listCode}/titles`), snap => {
      allItems = snap.val() || {};
      renderGrid();
      // Refresh detail if open
      if (currentDetailId && allItems[currentDetailId]) renderDetail(currentDetailId);
    });
    toast("🎬 Bienvenue " + userName + " !");
  }

  function disconnect() { if(unsubscribe) unsubscribe(); clearSession(); listCode=null; userName=null; show('home'); toast("👋 À bientôt !"); }

  // RENDER GRID
  function renderGrid() {
    const items = Object.entries(allItems).map(([id,v]) => ({id,...v}));
    document.getElementById('stat-total').textContent = items.length;
    document.getElementById('stat-voir').textContent = items.filter(i=>i.status==='voir').length;
    document.getElementById('stat-cours').textContent = items.filter(i=>i.status==='cours').length;
    document.getElementById('stat-vu').textContent = items.filter(i=>i.status==='vu').length;

    // Chips genres
    const genreSet = new Set();
    items.forEach(i => (i.genres||[]).forEach(g => genreSet.add(g)));
    const chipsRow = document.getElementById('chips-row');
    chipsRow.innerHTML = `<button class="chip ${genreFilter==='all'?'active':''}" onclick="setGenreFilter('all',this)">Tous genres</button>`;
    [...genreSet].sort().forEach(g => { chipsRow.innerHTML += `<button class="chip ${genreFilter===g?'active':''}" onclick="setGenreFilter('${g.replace(/'/g,"\\'")}',this)">${g}</button>`; });

    let filtered = items;
    if (typeFilter !== 'all') filtered = filtered.filter(i => i.type === typeFilter);
    if (genreFilter !== 'all') filtered = filtered.filter(i => (i.genres||[]).includes(genreFilter));
    filtered.sort((a,b) => (b.addedAt||0)-(a.addedAt||0));

    const grid = document.getElementById('main-grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty"><span class="empty-icon">🍿</span><div class="empty-text">Aucun titre ici</div></div>`;
      return;
    }
    grid.innerHTML = filtered.map(item => {
      const sc = {voir:'s-voir',cours:'s-cours',vu:'s-vu'}[item.status]||'s-voir';
      const sl = {voir:'À voir',cours:'En cours',vu:'Vu'}[item.status]||'À voir';
      const stars = item.stars ? '⭐'.repeat(item.stars) : '';
      const img = item.poster
        ? `<img class="poster-img" src="${TMDB_IMG}${item.poster}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""/><div class="poster-no-img" style="display:none;position:absolute;inset:0">🎬</div>`
        : `<div class="poster-no-img">🎬</div>`;
      return `<div class="poster-card" id="card-${item.id}" onclick="handleCardClick(event,'${item.id}')">
        ${img}
        ${stars ? `<div class="poster-stars">${stars}</div>` : ''}
        <div class="poster-status ${sc}">${sl}</div>
        <div class="poster-overlay"><div class="poster-title">${escHtml(item.title)}</div></div>
        <div class="card-status-bar">
          <button class="csb-btn csb-voir" onclick="quickStatus(event,'${item.id}','voir')">👁</button>
          <button class="csb-btn csb-cours" onclick="quickStatus(event,'${item.id}','cours')">▶️</button>
          <button class="csb-btn csb-vu" onclick="quickStatus(event,'${item.id}','vu')">✅</button>
        </div>
      </div>`;
    }).join('');
  }

  // Long press / tap logic for cards
  let pressTimer = null;
  function handleCardClick(e, id) {
    const card = document.getElementById('card-'+id);
    if (card.classList.contains('show-bar')) {
      // Already showing bar — tap on card body opens detail
      card.classList.remove('show-bar');
      openDetail(id);
    } else {
      openDetail(id);
    }
  }

  async function quickStatus(e, id, status) {
    e.stopPropagation();
    await db.update(db.ref(db.database, `cineclub/${listCode}/titles/${id}`), { status });
    const labels = {voir:'👁 À voir', cours:'▶️ En cours', vu:'✅ Vu'};
    toast(labels[status]);
    const card = document.getElementById('card-'+id);
    if (card) card.classList.remove('show-bar');
  }

  function setTypeFilter(f,btn) { typeFilter=f; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderGrid(); }
  function setGenreFilter(f,btn) { genreFilter=f; document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderGrid(); }

  // DETAIL
  function openDetail(id) {
    currentDetailId = id;
    renderDetail(id);
    document.getElementById('modal-detail').classList.add('open');
  }

  function renderDetail(id) {
    const item = allItems[id];
    if (!item) { console.error('Item not found:', id); return; }

    const s = item.status || 'voir';
    const stars = item.stars || 0;
    const sMap = {voir:'sel-voir', cours:'sel-cours', vu:'sel-vu'};

    const backdropHTML = item.backdrop
      ? '<img class="detail-backdrop" src="' + TMDB_BACK + item.backdrop + '" alt=""/>'
      : '<div class="detail-backdrop-ph">🎬</div>';
    const posterHTML = item.poster
      ? '<img class="detail-poster" src="' + TMDB_IMG + item.poster + '" alt=""/>'
      : '<div class="detail-poster-ph">🎬</div>';
    const genresHTML = (item.genres||[]).map(function(g){ return '<span class="genre-tag">'+g+'</span>'; }).join('');
    const overviewHTML = item.overview ? '<div class="detail-overview">'+escHtml(item.overview)+'</div>' : '';
    const starsHTML = [1,2,3,4,5].map(function(n){
      return '<button class="star-btn '+(stars>=n?'active':'')+'" onclick="setDetailStars('+n+')">⭐</button>';
    }).join('');

    const html = backdropHTML +
      '<div class="detail-body">' +
        '<div class="detail-handle" style="width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:12px auto 14px"></div>' +
        '<div class="detail-header">' +
          posterHTML +
          '<div class="detail-info">' +
            '<div class="detail-title">'+escHtml(item.title)+'</div>' +
            '<div class="detail-year">'+(item.year||'')+' · '+(item.type==='film'?'🎬 Film':'📺 Série')+'</div>' +
          '</div>' +
        '</div>' +
        (genresHTML ? '<div class="detail-genres">'+genresHTML+'</div>' : '') +
        overviewHTML +
        '<div id="trailer-zone"></div>' +
        '<div class="detail-section">Statut</div>' +
        '<div class="status-selector" id="detail-status">' +
          '<button class="status-opt '+(s==='voir'?'sel-voir':'')+'" data-s="voir" onclick="setDetailStatus('voir')">👁 À voir</button>' +
          '<button class="status-opt '+(s==='cours'?'sel-cours':'')+'" data-s="cours" onclick="setDetailStatus('cours')">▶️ En cours</button>' +
          '<button class="status-opt '+(s==='vu'?'sel-vu':'')+'" data-s="vu" onclick="setDetailStatus('vu')">✅ Vu</button>' +
        '</div>' +
        '<div class="detail-section">Note</div>' +
        '<div class="stars-selector" id="detail-stars">'+starsHTML+'</div>' +
        '<div class="detail-section">Commentaire</div>' +
        '<textarea class="comment-area" id="detail-comment" placeholder="Votre avis, remarques…">'+escHtml(item.comment||'')+'</textarea>' +
        '<div class="detail-by">Ajouté par <span>'+escHtml(item.addedBy)+'</span></div>' +
        '<button class="save-btn" onclick="saveDetail(''+id+'')">💾 Sauvegarder</button>' +
        '<button class="del-btn" onclick="deleteTitle(''+id+'')">🗑 Supprimer</button>' +
      '</div>';

    document.getElementById('detail-content').innerHTML = html;
    window._detailStatus = s;
    window._detailStars = stars;
    loadTrailer(item);
  }

  async function loadTrailer(item) {
    const zone = document.getElementById('trailer-zone');
    if (!zone || !item.tmdbId) return;
    try {
      const base = `https://api.themoviedb.org/3/${item.type==='film'?'movie':'tv'}/${item.tmdbId}/videos?api_key=${TMDB_KEY}`;
      let vids = [];
      const r1 = await fetch(base + '&language=fr-FR');
      const d1 = await r1.json();
      vids = (d1.results||[]).filter(v => v.type==='Trailer' && v.site==='YouTube');
      if (!vids.length) {
        const r2 = await fetch(base + '&language=en-US');
        const d2 = await r2.json();
        vids = (d2.results||[]).filter(v => v.type==='Trailer' && v.site==='YouTube');
      }
      if (!document.getElementById('trailer-zone')) return;
      if (vids.length) {
        const url = `https://www.youtube.com/watch?v=${vids[0].key}`;
        zone.innerHTML = `<button class="trailer-btn" onclick="window.open('${url}','_blank')">▶️ Voir la bande annonce sur YouTube</button>`;
      }
    } catch(e) {}
  }

  function setDetailStatus(s) {
    window._detailStatus = s;
    const map = {voir:'sel-voir',cours:'sel-cours',vu:'sel-vu'};
    document.querySelectorAll('#detail-status .status-opt').forEach(b => {
      b.className = 'status-opt ' + (b.getAttribute('data-s') === s ? map[s] : '');
    });
  }

  function setDetailStars(n) {
    const cur = window._detailStars;
    window._detailStars = cur === n ? 0 : n;
    document.querySelectorAll('#detail-stars .star-btn').forEach((b,i) => b.classList.toggle('active', i < window._detailStars));
  }

  async function saveDetail(id) {
    const comment = document.getElementById('detail-comment').value.trim();
    await db.update(db.ref(db.database, `cineclub/${listCode}/titles/${id}`), {
      status: window._detailStatus,
      stars: window._detailStars,
      comment
    });
    toast("💾 Sauvegardé !");
  }

  async function deleteTitle(id) {
    await db.remove(db.ref(db.database, `cineclub/${listCode}/titles/${id}`));
    currentDetailId = null;
    document.getElementById('modal-detail').classList.remove('open');
    toast("🗑 Supprimé");
  }

  // SEARCH
  async function searchTMDB(query) {
    try {
      const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=fr-FR&page=1`);
      const data = await res.json();
      const results = (data.results||[]).filter(r => r.media_type==='movie'||r.media_type==='tv').slice(0,7);
      if (!results.length) { document.getElementById('search-results').innerHTML = '<div class="searching">Aucun résultat</div>'; return; }
      window._sc = results.map(r => ({
        tmdbId: r.id,
        title: r.media_type==='movie' ? r.title : r.name,
        year: r.media_type==='movie' ? (r.release_date||'').substring(0,4) : (r.first_air_date||'').substring(0,4),
        poster: r.poster_path||null, backdrop: r.backdrop_path||null,
        type: r.media_type==='movie' ? 'film' : 'serie',
        overview: r.overview||'', genre_ids: r.genre_ids||[], vote: r.vote_average||0
      }));
      const html = window._sc.map((item,idx) => {
        const thumb = item.poster ? `<img class="search-thumb" src="${TMDB_IMG}${item.poster}" alt=""/>` : `<div class="search-thumb" style="display:flex;align-items:center;justify-content:center;font-size:18px">🎬</div>`;
        const tl = item.type==='film' ? '<span class="search-type type-film">Film</span>' : '<span class="search-type type-serie">Série</span>';
        return `<div class="search-item" onclick="selectResult(${idx})">${thumb}<div class="search-info"><div class="search-name">${escHtml(item.title)} ${tl}</div><div class="search-meta">${item.year} · ⭐ ${item.vote.toFixed(1)}</div></div></div>`;
      }).join('');
      document.getElementById('search-results').innerHTML = `<div class="search-results-wrap">${html}</div>`;
    } catch(e) { document.getElementById('search-results').innerHTML = '<div class="searching">Erreur TMDB</div>'; }
  }

  async function selectResult(idx) {
    const item = window._sc[idx];
    if (!item) return;
    item.genres = (item.genre_ids||[]).map(id => GENRE_MAP[id]).filter(Boolean);
    const entry = { ...item, status: 'voir', stars: 0, comment: '', addedBy: userName, addedAt: Date.now() };
    await db.push(db.ref(db.database, `cineclub/${listCode}/titles`), entry);
    closeModal('modal-add');
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').innerHTML = '';
    toast("🎬 " + item.title + " ajouté !");
  }

  // MODALS
  function openAdd() { document.getElementById('modal-add').classList.add('open'); setTimeout(()=>document.getElementById('search-input').focus(),400); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); if(id==='modal-detail') currentDetailId=null; }
  function handleOverlay(e,id) { if(e.target===document.getElementById(id)) closeModal(id); }

  // UTILS
  function copyCode() { if(navigator.clipboard) navigator.clipboard.writeText(listCode).then(()=>toast("📋 Code copié !")); else toast("Code : "+listCode); }
  function showError(msg) { const el=document.getElementById('home-error'); el.textContent='⚠️ '+msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500); }
  function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2500); }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
